name: Generate Custom Color Stats

on:
  schedule:
    # Runs automatically once a day at midnight
    - cron: "0 0 * * *"
  workflow_dispatch: # Allows you to run it manually from the Actions tab

jobs:
  update-cards:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Needed to push the new images to your repo

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Fetch and Modify SVGs
        run: |
          # Create a folder for the customized cards
          mkdir -p custom-cards
          
          # Download the cards and instantly replace the date_night background (#170f0c) with #2D2123
          curl -s "https://github-profile-summary-cards.vercel.app/api/cards/profile-details?username=antony-jacob817&theme=date_night" | sed 's/#170f0c/#2D2123/gi' > custom-cards/profile-details.svg
          
          curl -s "https://github-profile-summary-cards.vercel.app/api/cards/stats?username=antony-jacob817&theme=date_night" | sed 's/#170f0c/#2D2123/gi' > custom-cards/stats.svg
          
          curl -s "https://github-profile-summary-cards.vercel.app/api/cards/productive-time?username=antony-jacob817&theme=date_night" | sed 's/#170f0c/#2D2123/gi' > custom-cards/productive-time.svg

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add custom-cards/
          # Only commit if there are actual changes
          git commit -m "Update custom stats cards" || echo "No changes to commit"
          git push
